databases:
  - name: infinitycloud-db
    databaseName: infinitycloud
    user: infinitycloud
    plan: free

services:
  - type: web
    name: infinitycloud-backend
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma db push --accept-data-loss
    startCommand: npm start
    disk:
      name: uploads
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: infinitycloud-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CREDENCIALES_MASTER_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /data/uploads

  - type: web
    name: infinitycloud-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://infinitycloud-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
